services:
  # ==========================================
  # 1. MS DIRECTORIO (Puerto 8081)
  # ==========================================
  directorio-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: directorio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  ms-directorio:
    build: 
      context: ./ms-directorio
      dockerfile: Dockerfile
    container_name: ms-directorio
    ports:
      - "8081:8081"
    environment:
      - SERVER_PORT=8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://directorio-db:5432/directorio_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      directorio-db:
        condition: service_healthy

  # ==========================================
  # 2. MS NÚCLEO / SWITCH (Puerto 8082)
  # ==========================================
  nucleo-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nucleo_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  ms-nucleo:
    build: 
      context: ./MSNucleoSwitch
      dockerfile: Dockerfile
    container_name: ms-nucleo
    ports:
      - "8082:8082"
    environment:
      - SERVER_PORT=8082
      - SPRING_DATASOURCE_URL=jdbc:postgresql://nucleo-db:5432/nucleo_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      # IMPORTANTE: Así es como el Núcleo sabe a dónde llamar a los otros
      - URL_DIRECTORIO=http://ms-directorio:8081
      - URL_CONTABILIDAD=http://ms-contabilidad:8083
    depends_on:
      nucleo-db:
        condition: service_healthy
      ms-directorio:
        condition: service_started

  # ==========================================
  # 3. MS CONTABILIDAD (Puerto 8083)
  # ==========================================
  contabilidad-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: contabilidad_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  ms-contabilidad:
    build: 
      context: ./Switch-ms-contabilidad
      dockerfile: Dockerfile
    container_name: ms-contabilidad
    ports:
      - "8083:8083"
    environment:
      - SERVER_PORT=8083
      - SPRING_DATASOURCE_URL=jdbc:postgresql://contabilidad-db:5432/contabilidad_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      contabilidad-db:
        condition: service_healthy

  # ==========================================
  # 4. MS COMPENSACIÓN (Puerto 8084)
  # ==========================================
  compensacion-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: compensacion_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  ms-compensacion:
    build: 
      context: ./MSCompensacionSwitch
      dockerfile: Dockerfile
    container_name: ms-compensacion
    ports:
      - "8084:8084"
    environment:
      - SERVER_PORT=8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://compensacion-db:5432/compensacion_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      compensacion-db:
        condition: service_healthy

  # ==========================================
  # 5. MS DEVOLUCIONES (Puerto 8085)
  # ==========================================
  devolucion-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devolucion
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d devolucion"]
      interval: 5s
      retries: 5

  ms-devolucion:
    build: 
      context: ./MSDevolucionSwitch
      dockerfile: Dockerfile
    container_name: ms-devolucion
    ports:
      - "8085:8085"
    environment:
      - SERVER_PORT=8085
      - SPRING_DATASOURCE_URL=jdbc:postgresql://devolucion-db:5432/devolucion
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=admin
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      devolucion-db:
        condition: service_healthy

# ==========================================
  # 6. KONG DATABASE (El Cerebro)
  # ==========================================
  kong-database:
    image: postgres:13
    container_name: kong-database
    restart: always
    environment:
      POSTGRES_USER: kong
      POSTGRES_DB: kong
      POSTGRES_PASSWORD: kong
    ports:
      - "5438:5432" # Puerto diferente para no chocar con los otros
    volumes:
      - kong_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 7. KONG MIGRATION (Inicializador)
  # ==========================================
  # Este servicio corre una vez, prepara la BD y se apaga solo.
  kong-migration:
    image: kong:3.4
    container_name: kong-migration
    command: "kong migrations bootstrap"
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
    depends_on:
      kong-database:
        condition: service_healthy

  # ==========================================
  # 8. KONG API GATEWAY (Modo DB)
  # ==========================================
  kong:
    image: kong:3.4
    container_name: kong-gateway
    restart: always
    environment:
      KONG_DATABASE: postgres        # ¡Ahora usamos DB!
      KONG_PG_HOST: kong-database
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: kong
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_LISTEN: 0.0.0.0:8000, 0.0.0.0:8443 ssl
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    ports:
      - "8000:8000"
      - "8443:8443"
      - "8001:8001"
    depends_on:
      kong-migration:
        condition: service_completed_successfully # Espera a que la BD esté lista
      ms-nucleo:
        condition: service_started

  # ==========================================
  # 9. KONGA DASHBOARD
  # ==========================================
  konga:
    image: revomatico/konga
    container_name: konga-dashboard
    restart: always
    environment:
      NODE_ENV: production
      DB_ADAPTER: postgres
      DB_URI: postgresql://kong:kong@kong-database:5432/konga_db # Konga también guarda sus cosas aquí
    ports:
      - "1337:1337"
    depends_on:
      - kong

volumes:
  kong_data: # Para persistir los datos de Kong