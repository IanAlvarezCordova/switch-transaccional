_format_version: "3.0"

services:
  # --- EL NÚCLEO ---
  - name: switch-nucleo-service
    url: http://ms-nucleo:8082
    routes:
      - name: ruta-transacciones
        paths:
          # CAMBIO CLAVE: Usamos la ruta exacta que tu Java espera
          - /api/v1/transacciones
        strip_path: false  # Importante: Pasa la ruta tal cual
        methods:
          - POST
    plugins:
      - name: key-auth
        config:
          key_names:
            - apikey
      - name: prometheus
      - name: cors
        config:
          origins:
            - "*"
          methods:
            - GET
            - POST
            - OPTIONS
          headers:
            - Accept
            - Accept-Version
            - Content-Length
            - Content-MD5
            - Content-Type
            - Date
            - X-Auth-Token
            - apikey

consumers:
  # --- TUS 4 BANCOS ---
  - username: NEXUS_BANK
    keyauth_credentials:
      - key: NEXUS_SECRET_KEY_123

  - username: ECUSOL_BK
    keyauth_credentials:
      - key: PUBLIC_KEY_ECUSOL_67890

  - username: BANTEC
    keyauth_credentials:
      - key: BANTEC_SECRET_KEY_2025

  - username: ARCBANK
    keyauth_credentials:
      - key: ARCBANK_SECRET_KEY_2025_XYZ