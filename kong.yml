_format_version: "3.0"

services:
  # --- 1. EL NÚCLEO (Servicio Principal) ---
  - name: switch-nucleo-service
    url: http://ms-nucleo:8082
    routes:
      - name: ruta-transferencias
        paths:
          - /api/switch/v1/transferir
    plugins:
      - name: key-auth  # Pide clave obligatoria
      - name: prometheus # Manda datos a Grafana
      - name: cors       # Evita errores de navegador

  # --- 2. SERVICIOS SECUNDARIOS (Para el Show Visual) ---
  # Aunque no los consumas todos por Kong, sirven para poblar el mapa
  - name: ms-contabilidad
    url: http://ms-contabilidad:8083
    routes:
      - name: admin-contabilidad
        paths:
          - /admin/contabilidad

  - name: ms-compensacion
    url: http://ms-compensacion:8084
    routes:
      - name: admin-compensacion
        paths:
          - /admin/compensacion

  - name: ms-devolucion
    url: http://ms-devolucion:8085
    routes:
      - name: admin-devolucion
        paths:
          - /admin/devolucion

  - name: ms-directorio
    url: http://ms-directorio:8081
    routes:
      - name: admin-directorio
        paths:
          - /admin/directorio

consumers:
  # --- BANCOS AUTORIZADOS ---
  - username: NEXUS_BANK
    keyauth_credentials:
      - key: NEXUS_SECRET_KEY_123

  - username: ECUSOL_BK
    keyauth_credentials:
      - key: PUBLIC_KEY_ECUSOL_67890

  - username: BANTEC
    keyauth_credentials:
      - key: BANTEC_SECRET_KEY_2025

  - username: ARCBANK
    keyauth_credentials:
      - key: ARCBANK_SECRET_KEY_2025_XYZ
